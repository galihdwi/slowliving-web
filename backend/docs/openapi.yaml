    ExpenseCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Perbaikan Jalan
    ExpenseRequest:
      type: object
      required: [expense_date, amount, description]
      properties:
        _method:
          type: string
          enum: [PUT]
          description: Opsional jika request update dikirim sebagai POST multipart.
        expense_category_id:
          type: integer
          nullable: true
          example: 1
        expense_category_name:
          type: string
          nullable: true
          maxLength: 255
          example: Perbaikan Jalan
        expense_date:
          type: string
          format: date
          example: "2026-06-15"
        amount:
          type: number
          format: float
          minimum: 1
          example: 250000
        description:
          type: string
          example: Tambal jalan depan pos satpam
        proof:
          type: string
          format: binary
          nullable: true
    Expense:
      type: object
      properties:
        id:
          type: integer
        expense_category_id:
          type: integer
          nullable: true
        expense_date:
          type: string
          format: date
        amount:
          type: number
          format: float
        description:
          type: string
        proof_path:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/ExpenseCategory"
    ExpenseCollectionResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
