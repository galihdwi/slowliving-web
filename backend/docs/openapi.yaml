openapi: 3.0.3
info:
  title: Slowliving System API
  version: 1.0.0
  description: OpenAPI untuk aplikasi administrasi penghuni, rumah, pembayaran iuran, pengeluaran, dan laporan RT.
servers:
  - url: https://api.slowliving.galihdwi.dev/api
    description: Local Laravel API

tags:
  - name: Auth
  - name: Residents
  - name: Houses
  - name: Invoices
  - name: Payments
  - name: Expenses
  - name: Reports

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/JSendSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout user dan hapus token aktif
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me:
    get:
      tags: [Auth]
      summary: Ambil profil user yang sedang login
      responses:
        "200":
          description: Profil user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/JSendSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /residents:
    get:
      tags: [Residents]
      summary: Daftar penghuni
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - name: search
          in: query
          schema:
            type: string
          description: Cari berdasarkan nama atau nomor telepon.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ResidentStatus"
      responses:
        "200":
          description: Daftar penghuni
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentCollectionResponse"
    post:
      tags: [Residents]
      summary: Tambah penghuni
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ResidentCreateRequest"
      responses:
        "201":
          description: Penghuni berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentSingleResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /residents/{resident}:
    get:
      tags: [Residents]
      summary: Detail penghuni
      parameters:
        - $ref: "#/components/parameters/ResidentId"
      responses:
        "200":
          description: Detail penghuni
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentSingleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Residents]
      summary: Ubah penghuni
      description: Untuk upload file dari browser yang tidak nyaman dengan multipart PUT, gunakan POST dengan field `_method=PUT`.
      parameters:
        - $ref: "#/components/parameters/ResidentId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ResidentUpdateRequest"
      responses:
        "200":
          description: Penghuni berhasil diubah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentSingleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /houses:
    get:
      tags: [Houses]
      summary: Daftar rumah
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - name: search
          in: query
          schema:
            type: string
          description: Cari berdasarkan nomor rumah atau alamat.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/HouseStatus"
      responses:
        "200":
          description: Daftar rumah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseCollectionResponse"
    post:
      tags: [Houses]
      summary: Tambah rumah
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseRequest"
      responses:
        "200":
          description: Rumah berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseSingleResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /houses/{house}:
    get:
      tags: [Houses]
      summary: Detail rumah beserta history penghuni dan pembayaran
      parameters:
        - $ref: "#/components/parameters/HouseId"
      responses:
        "200":
          description: Detail rumah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Houses]
      summary: Ubah rumah
      parameters:
        - $ref: "#/components/parameters/HouseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseRequest"
      responses:
        "200":
          description: Rumah berhasil diubah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseSingleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /houses/{house}/occupancies:
    post:
      tags: [Houses]
      summary: Tambah penghuni aktif untuk rumah
      parameters:
        - $ref: "#/components/parameters/HouseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseOccupancyRequest"
      responses:
        "201":
          description: Occupancy berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseOccupancyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /invoices:
    get:
      tags: [Invoices]
      summary: Daftar invoice iuran
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InvoiceStatus"
        - name: month
          in: query
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-06"
        - name: house_id
          in: query
          schema:
            type: integer
        - name: resident_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daftar invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceCollectionResponse"

  /invoices/generate-monthly:
    post:
      tags: [Invoices]
      summary: Generate invoice bulanan untuk rumah yang dihuni
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMonthlyInvoiceRequest"
      responses:
        "201":
          description: Invoice berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateMonthlyInvoiceResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /invoices/{invoice}:
    get:
      tags: [Invoices]
      summary: Detail invoice
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Detail invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSingleResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments:
    get:
      tags: [Payments]
      summary: Daftar pembayaran
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - name: month
          in: query
          schema:
            type: string
            example: "2026-06"
        - name: house_id
          in: query
          schema:
            type: integer
        - name: resident_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daftar pembayaran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCollectionResponse"
    post:
      tags: [Payments]
      summary: Tambah pembayaran
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "201":
          description: Pembayaran berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSingleResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /expenses:
    get:
      tags: [Expenses]
      summary: Daftar pengeluaran
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - name: month
          in: query
          schema:
            type: string
            example: "2026-06"
        - name: expense_category_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daftar pengeluaran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCollectionResponse"
    post:
      tags: [Expenses]
      summary: Tambah pengeluaran
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
      responses:
        "201":
          description: Pengeluaran berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseSingleResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /expenses/{expense}:
    put:
      tags: [Expenses]
      summary: Ubah pengeluaran
      description: Untuk upload file dari browser yang tidak nyaman dengan multipart PUT, gunakan POST dengan field `_method=PUT`.
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
      responses:
        "200":
          description: Pengeluaran berhasil diubah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseSingleResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reports/monthly-summary:
    get:
      tags: [Reports]
      summary: Ringkasan pemasukan, pengeluaran, dan saldo per bulan dalam satu tahun
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
            example: 2026
      responses:
        "200":
          description: Ringkasan bulanan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummaryResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reports/monthly-detail:
    get:
      tags: [Reports]
      summary: Detail pemasukan dan pengeluaran bulan tertentu
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-06"
      responses:
        "200":
          description: Detail bulanan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyDetailResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    PageSize:
      name: per_page
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    ResidentId:
      name: resident
      in: path
      required: true
      schema:
        type: integer
      example: 1
    HouseId:
      name: house
      in: path
      required: true
      schema:
        type: integer
      example: 1
    InvoiceId:
      name: invoice
      in: path
      required: true
      schema:
        type: integer
      example: 1
    ExpenseId:
      name: expense
      in: path
      required: true
      schema:
        type: integer
      example: 1

  responses:
    Unauthorized:
      description: Token tidak valid, token tidak dikirim, atau kredensial salah
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JSendFail"
    NotFound:
      description: Data tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JSendFail"
    ValidationError:
      description: Validasi gagal
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JSendFail"

  schemas:
    JSendSuccess:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
    JSendFail:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [fail]
        data:
          type: object
          additionalProperties: true
          example:
            message: Data tidak ditemukan.
    MessageSuccess:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                message:
                  type: string

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 20
        last_page:
          type: integer
          example: 2

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin RT
        email:
          type: string
          format: email
          example: test@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          format: password
          example: password
    LoginData:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ResidentStatus:
      type: string
      enum: [permanent, contract]
    MaritalStatus:
      type: string
      enum: [single, married]
    HouseStatus:
      type: string
      enum: [vacant, occupied]
    InvoiceStatus:
      type: string
      enum: [unpaid, partial, paid]

    Resident:
      type: object
      properties:
        id:
          type: integer
          example: 1
        full_name:
          type: string
          example: Budi Santoso
        ktp_photo_path:
          type: string
          nullable: true
          example: ktp_photos/example.jpg
        resident_status:
          $ref: "#/components/schemas/ResidentStatus"
        phone_number:
          type: string
          example: "081234567890"
        marital_status:
          $ref: "#/components/schemas/MaritalStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ResidentCreateRequest:
      type: object
      required: [full_name, resident_status, phone_number, marital_status]
      properties:
        full_name:
          type: string
          maxLength: 255
        ktp_photo:
          type: string
          format: binary
          nullable: true
        resident_status:
          $ref: "#/components/schemas/ResidentStatus"
        phone_number:
          type: string
          maxLength: 30
        marital_status:
          $ref: "#/components/schemas/MaritalStatus"
    ResidentUpdateRequest:
      type: object
      properties:
        _method:
          type: string
          enum: [PUT]
          description: Opsional jika request dikirim sebagai POST multipart.
        full_name:
          type: string
          maxLength: 255
        ktp_photo:
          type: string
          format: binary
          nullable: true
        resident_status:
          $ref: "#/components/schemas/ResidentStatus"
        phone_number:
          type: string
          maxLength: 30
        marital_status:
          $ref: "#/components/schemas/MaritalStatus"
    ResidentCollectionResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/Resident"
                pagination:
                  $ref: "#/components/schemas/Pagination"
    ResidentSingleResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                resident:
                  $ref: "#/components/schemas/Resident"

    House:
      type: object
      properties:
        id:
          type: integer
          example: 1
        house_number:
          type: string
          example: A-01
        address:
          type: string
          nullable: true
          example: Cluster Utama No. A-01
        house_status:
          $ref: "#/components/schemas/HouseStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    HouseRequest:
      type: object
      required: [house_number, house_status]
      properties:
        house_number:
          type: string
          maxLength: 255
          example: A-01
        address:
          type: string
          nullable: true
          example: Cluster Utama No. A-01
        house_status:
          $ref: "#/components/schemas/HouseStatus"
    HouseCollectionResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/House"
                pagination:
                  $ref: "#/components/schemas/Pagination"
    HouseSingleResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                houses:
                  $ref: "#/components/schemas/House"
    HouseDetailResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                houses:
                  $ref: "#/components/schemas/House"
                occupancy_history:
                  type: array
                  items:
                    $ref: "#/components/schemas/HouseOccupancy"
                payment_history:
                  type: array
                  items:
                    $ref: "#/components/schemas/Invoice"

    HouseOccupancy:
      type: object
      properties:
        id:
          type: integer
        house_id:
          type: integer
        resident_id:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
        resident:
          $ref: "#/components/schemas/Resident"
    HouseOccupancyRequest:
      type: object
      required: [resident_id, start_date]
      properties:
        resident_id:
          type: integer
          example: 1
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"
        notes:
          type: string
          nullable: true
    HouseOccupancyResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                occupancy:
                  $ref: "#/components/schemas/HouseOccupancy"

    FeeType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Satpam
        code:
          type: string
          example: security
        amount:
          type: number
          format: float
          example: 100000
        is_active:
          type: boolean
          example: true

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoice_id:
          type: integer
        fee_type_id:
          type: integer
        description:
          type: string
          example: Satpam 2026-06
        amount:
          type: number
          format: float
          example: 100000
        fee_type:
          $ref: "#/components/schemas/FeeType"
    Invoice:
      type: object
      properties:
        id:
          type: integer
        house_id:
          type: integer
        resident_id:
          type: integer
        house_occupancy_id:
          type: integer
          nullable: true
        period_month:
          type: string
          format: date
          example: "2026-06-01"
        due_date:
          type: string
          format: date
        total_amount:
          type: number
          format: float
        paid_amount:
          type: number
          format: float
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        house:
          $ref: "#/components/schemas/House"
        resident:
          $ref: "#/components/schemas/Resident"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
    GenerateMonthlyInvoiceRequest:
      type: object
      properties:
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
          example: "2026-06"
        due_date:
          type: string
          format: date
          example: "2026-06-30"
    GenerateMonthlyInvoiceResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                created_count:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/Invoice"
    InvoiceCollectionResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/Invoice"
                pagination:
                  $ref: "#/components/schemas/Pagination"
    InvoiceSingleResponse:
      allOf:
        - $ref: "#/components/schemas/JSendSuccess"
        - type: object
          properties:
            data:
              type: object
              properties:
                invoice:
                  $ref: "#/components/schemas/Invoice"

    PaymentAllocationRequest:
      type: object
      required: [invoice_item_id, amount]
      properties:
        invoice_item_id:
          type: integer
          example: 1
        amount:
          type: number
          format: float
          minimum: 1
          example: 100000
    PaymentAllocation:
      allOf:
        - $ref: "#/components/schemas/PaymentAllocationRequest"
        - type: object
          properties:
            id:
              type: integer
            payment_id:
              type: integer
    PaymentRequest:
      type: object
      required: [resident_id, house_id, payment_date, amount]
      properties:
        resident_id:
          type: integer
          example: 1
        house_id:
          type: integer
          example: 1
        payment_date:
          type: string
          format: date
          example: "2026-06-10"
        amount:
          type: number
          format: float
          minimum: 1
          example: 115000
        payment_method:
          type: string
          nullable: true
          maxLength: 100
          example: Transfer
        notes:
          type: string
          nullable: true
        allocations:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PaymentAllocationRequest"
    Payment:
      allOf:
        - $ref: "#/components/schemas/PaymentRequest"
        - type: object
          properties:
